<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Stories | Clara's Stories</title>
    <meta
      name="description"
      content="A quiet place to read Bahá'í stories, with each passage held close to its author and source."
    />
    <meta name="application-name" content="Clara's Stories" />
    <meta name="theme-color" content="#09131a" />
    <meta name="color-scheme" content="light dark" />
    <meta name="format-detection" content="telephone=no" />
    <script>
      document.documentElement.classList.add("js");
      try {
        if (localStorage.getItem("claraTheme") === "dark") {
          document.documentElement.dataset.theme = "dark";
          document.querySelector('meta[name="theme-color"]')?.setAttribute("content", "#09131a");
        }
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="icon" href="./icons/clara-logo.svg" type="image/svg+xml" />
    <link rel="icon" href="./icons/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="icon" href="./icons/icon-512.png" sizes="512x512" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Clara's Stories" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=20260604-story-refresh-1" />
  </head>
  <body class="stories-page">
    <header class="site-header" data-header>
      <a class="brand" href="./index.html" aria-label="Clara's Stories home">
        <span class="brand-mark">C</span>
        <span>
          <strong>Clara's Stories</strong>
          <small>Stories of light and<br />courage</small>
        </span>
      </a>
      <nav class="nav" aria-label="Primary navigation">
        <a class="nav-link" href="./stories.html" aria-current="page">Stories</a>
        <button
          class="theme-toggle nav-theme"
          type="button"
          data-theme-toggle
          aria-label="Switch to dark mode"
          aria-pressed="false"
        >
          <span aria-hidden="true"></span>
        </button>
        <details class="nav-menu">
          <summary class="nav-action" aria-label="Open menu" title="Menu">
            <span class="menu-icon" aria-hidden="true"></span>
          </summary>
          <div class="nav-menu-panel">
            <a class="nav-menu-item" href="./stories.html" aria-current="page">
              <span>Stories</span>
              <small>Browse the library</small>
            </a>
            <a class="nav-menu-item" href="./about.html">
              <span>About</span>
              <small>How Clara's Stories is made</small>
            </a>
            <span class="nav-menu-item is-disabled" aria-disabled="true">
              <span>Letters</span>
              <small>Coming soon</small>
            </span>
            <button class="nav-menu-item" type="button" data-install-app>
              <span>Install app</span>
              <small>Add to Home Page</small>
            </button>
          </div>
        </details>
      </nav>
    </header>

    <main>
      <section class="story-stage" id="stories">
        <div class="section-heading">
          <p class="kicker" id="stories-anchor">Stories</p>
          <h2>Choose any, sit back and <span>settle in.</span></h2>
        </div>

        <div class="library-tools">
          <label class="search-field">
            <span>Search</span>
            <input
              type="search"
              placeholder="Martha-Root, Peace, Táhirih..."
              data-story-search
              maxlength="120"
              autocapitalize="none"
              autocomplete="off"
              spellcheck="false"
            />
          </label>
          <div class="filters" aria-label="Story filters" data-story-filters></div>
          <p class="library-count" data-story-count>Showing stories</p>
        </div>

        <div class="story-grid" data-story-grid></div>
      </section>
    </main>

    <footer class="footer">
      <p>Clara's Stories</p>
      <a href="./index.html">Back home</a>
    </footer>

    <script src="./stories.js?v=20260604-story-refresh-1"></script>
    <script src="./install.js?v=20260604-story-refresh-1"></script>
    <script src="./script.js?v=20260604-story-refresh-1"></script>
  </body>
</html>
