<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clara's Stories | Bahá'í Stories</title>
    <meta
      name="description"
      content="A quiet place to read Bahá'í stories, with each passage held close to its author and source."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="./index.html" aria-label="Clara's Stories home">
        <span class="brand-mark">C</span>
        <span>
          <strong>Clara's Stories</strong>
          <small>Stories of light and courage</small>
        </span>
      </a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="#stories">Stories</a>
      </nav>
    </header>

    <main>
      <section class="hero reveal is-visible" aria-labelledby="hero-title">
        <div class="hero-copy">
          <p class="kicker" data-bahai-date>Bahá'í day</p>
          <h1 id="hero-title">Stories kept close to the heart.</h1>
          <p>
            Come in for a story of faith, sacrifice, or courage. Stay with it as long as it asks.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#stories">Read the stories</a>
          </div>
        </div>

        <figure class="hero-image" aria-label="The Shrine of the Báb and gardens in Haifa">
          <img
            src="https://commons.wikimedia.org/wiki/Special:FilePath/Shrine%20of%20The%20Bab.jpg"
            alt="The Shrine of the Báb and gardens in Haifa"
          />
        </figure>
      </section>

      <section class="story-stage" id="stories">
        <div class="section-heading">
          <p class="kicker">Stories</p>
          <h2>Choose any, sit back and <span>settle.</span></h2>
        </div>

        <div class="library-tools">
          <label class="search-field">
            <span>Search</span>
            <input type="search" placeholder="Martha-Root, Peace, Táhirih..." data-story-search />
          </label>
          <div class="filters" aria-label="Story filters" data-story-filters></div>
          <p class="library-count" data-story-count>Showing stories</p>
        </div>

        <div class="story-grid" data-story-grid></div>
      </section>
    </main>

    <footer class="footer">
      <p>Clara's Stories</p>
      <a href="#stories">Back to stories</a>
    </footer>

    <script src="./stories.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
