<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Clara's Stories | Bahá'í Stories</title>
    <meta
      name="description"
      content="A quiet place to read Bahá'í stories, with each passage held close to its author and source."
    />
    <meta name="theme-color" content="#ffffff" />
    <script>
      if (localStorage.getItem("claraTheme") === "dark") {
        document.documentElement.dataset.theme = "dark";
        document.querySelector('meta[name="theme-color"]')?.setAttribute("content", "#09131a");
      }

    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="/icons/clara-logo.svg" type="image/svg+xml" />
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" sizes="180x180" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Clara's Stories" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="./styles.css?v=20260504-ui" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="./index.html" aria-label="Clara's Stories home">
        <span class="brand-mark">C</span>
        <span>
          <strong>Clara's Stories</strong>
          <small>Stories of light and courage</small>
        </span>
      </a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="#stories">Stories</a>
        <button
          class="theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Switch to dark mode"
          aria-pressed="false"
        >
          <span aria-hidden="true"></span>
        </button>
      </nav>
    </header>

    <main>
      <section class="hero reveal is-visible" aria-labelledby="hero-title">
        <div class="hero-copy">
          <p class="kicker" data-bahai-date>Bahá'í day</p>
          <h1 id="hero-title">Stories kept close to the heart.</h1>
          <p>
            Come in for a story of faith, sacrifice, or courage.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#stories">Read the stories</a>
          </div>
        </div>

        <figure class="hero-image" aria-label="The Shrine of the Báb and gardens in Haifa">
          <img
            src="https://commons.wikimedia.org/wiki/Special:FilePath/Shrine%20of%20The%20Bab.jpg"
            alt="The Shrine of the Báb and gardens in Haifa"
          />
        </figure>
      </section>

      <section class="story-stage" id="stories">
        <div class="section-heading">
          <p class="kicker" id="stories-anchor">Stories</p>
          <h2>Choose any, sit back and <span>settle in.</span></h2>
        </div>

        <div class="library-tools">
          <label class="search-field">
            <span>Search</span>
            <input
              type="search"
              placeholder="Martha-Root, Peace, Táhirih..."
              data-story-search
              maxlength="120"
              autocapitalize="none"
              autocomplete="off"
              spellcheck="false"
            />
          </label>
          <div class="filters" aria-label="Story filters" data-story-filters></div>
          <p class="library-count" data-story-count>Showing stories</p>
        </div>

        <div class="story-grid" data-story-grid></div>
      </section>
    </main>

    <footer class="footer">
      <p>Clara's Stories</p>
      <a href="#stories">Back to stories</a>
    </footer>

    <script src="./stories.js"></script>
    <script src="./script.js?v=20260504-ui"></script>
  </body>
</html>
