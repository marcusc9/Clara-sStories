<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clara's Stories</title>
    <meta
      name="description"
      content="Read a complete Bahá'í story with its source close by."
    />
    <meta name="theme-color" content="#fbf6e8" />
    <script>
      if (localStorage.getItem("claraTheme") === "dark") {
        document.documentElement.dataset.theme = "dark";
        document.querySelector('meta[name="theme-color"]')?.setAttribute("content", "#09131a");
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./icons/clara-logo.svg" type="image/svg+xml" />
    <link rel="icon" href="./icons/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" sizes="180x180" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Clara" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="./index.html" aria-label="Clara's Stories home">
        <span class="brand-mark">C</span>
        <span>
          <strong>Clara's Stories</strong>
          <small>Stories of light and courage</small>
        </span>
      </a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="./index.html#stories">Stories</a>
        <button
          class="theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Switch to dark mode"
          aria-pressed="false"
        >
          <span aria-hidden="true"></span>
        </button>
      </nav>
    </header>

    <main class="story-page" data-story-page>
      <p class="kicker">Story</p>
      <h1 data-story-title>Loading story</h1>
    </main>

    <script src="./stories.js"></script>
    <script src="./narration-assets.js"></script>
    <script src="./story.js"></script>
  </body>
</html>
